function fmtMoney(n){
  n = Number(n)||0;
  const s = Math.abs(n).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n<0?'-':'') + s;
}
function fmtDateShort(iso){ const [y,m,d]=iso.split('-').map(Number); return `${d} ${THAI_MONTHS_SHORT[m-1]} ${y+543}`; }
function fmtDateFull(iso){ const [y,m,d]=iso.split('-').map(Number); return `${d} ${THAI_MONTHS_FULL[m-1]} พ.ศ.${y+543}`; }
function monthKey(iso){ return iso.slice(0,7); }
function monthLabel(key){ const [y,m]=key.split('-').map(Number); return `${THAI_MONTHS_FULL[m-1]} ${y+543}`; }
function daysInMonth(key){ const [y,m]=key.split('-').map(Number); return new Date(y,m,0).getDate(); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* =========================================================================
   SUPABASE CLIENT & RPC HELPERS
   ========================================================================= */
const SUPABASE_URL = 'https://ygfksgfwysxjhseasder.supabase.co';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_SUPABASE_ANON_KEY_HERE'; // TODO: แทนที่ด้วย anon/public key จาก Supabase Dashboard > Settings > API
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const TOKEN_KEY = 'fms_session_token';
function saveToken(t){ localStorage.setItem(TOKEN_KEY, t); }
function getToken(){ return localStorage.getItem(TOKEN_KEY); }
function clearToken(){ localStorage.removeItem(TOKEN_KEY); }

function parseRpcError(msg){
  const raw = String(msg||'');
  const m = raw.match(/^[A-Z_]+:\s*(.+)$/s);
  return m ? m[1] : 'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง';
}
async function callRpc(name, params){
  const { data, error } = await sb.rpc(name, params);
  if(error){
    if(String(error.message||'').includes('SESSION_INVALID')) logout();
    throw new Error(parseRpcError(error.message));
  }
  return data;
}

/* =========================================================================
   DATA MODEL (ข้อมูลจะถูกโหลดจาก Supabase หลัง login เท่านั้น ไม่มีข้อมูลจำลอง)
   ========================================================================= */
const DB = { users: [], students: {} };
const DEFAULT_PASSWORD = '1234';
function usernameFromEmail(email){ return String(email).split('@')[0]; }
function totalBalance(sid){
  const s = DB.students[sid];
  if(!s) return 0;
  if(s.balance !== undefined) return s.balance;
  return s.accounts.reduce((sum,a)=>sum+a.balance,0);
}

let ME = null;
function applyAppState(data){
  ME = data.profile;
  if(ME.role === 'student'){
    DB.users = [ME];
    DB.students = {};
    DB.students[ME.id] = {
      accounts: data.accounts,
      expenseCategories: data.expenseCategories,
      incomeCategories: data.incomeCategories,
      transactions: data.transactions,
    };
  } else if(ME.role === 'advisor'){
    DB.users = data.students.map(s=>({id:s.id, role:'student', name:s.name, email:s.email, major:s.major, advisorId:ME.id}));
    DB.students = {};
    data.students.forEach(s=>{ DB.students[s.id] = {balance:s.balance, accountCount:s.accountCount, txnCount:s.txnCount}; });
  } else if(ME.role === 'admin'){
    DB.users = data.users;
    DB.students = {};
    data.users.forEach(u=>{ if(u.role==='student') DB.students[u.id] = {balance:u.balance}; });
  }
}
async function refreshAppState(){
  const data = await callRpc('get_app_state', {p_token:TOKEN});
  applyAppState(data);
}

function setState(patch){ Object.assign(state, patch); render(); }

/* =========================================================================
   DERIVED HELPERS
   ========================================================================= */
function curStudent(){ return DB.students[state.currentStudentId]; }
function curUser(){ return DB.users.find(u=>u.id===state.currentStudentId); }
function studentsOf(advisorId){ return DB.users.filter(u=>u.role==='student' && u.advisorId===advisorId); }
function accountName(s,id){ const a=s.accounts.find(x=>x.id===id); return a? a.name : 'บัญชีที่ถูกลบ'; }
function catInfo(list,id){ return list.find(c=>c.id===id) || {name:'หมวดที่ถูกลบ', icon:'❓'}; }
function allMonthsFor(sid){
  const s = DB.students[sid];
  const set = new Set(s.transactions.filter(t=>t.type!=='transfer').map(t=>monthKey(t.date)));
  return [...set].sort().reverse();
}
function monthTxns(sid, mkey, type){
  const s = DB.students[sid];
  return s.transactions.filter(t => monthKey(t.date)===mkey && (type? t.type===type : true));
}
function expenseByCategory(sid, mkey){
  const s = DB.students[sid];
  const exp = monthTxns(sid, mkey, 'expense');
  const map = {};
  exp.forEach(t=>{
    map[t.categoryId] = (map[t.categoryId]||0) + Number(t.amount);
  });
  return Object.entries(map).map(([catId,total])=>({catId, total, cat: catInfo(s.expenseCategories, catId)}))
    .sort((a,b)=>b.total-a.total);
}

function render(){
  const app = document.getElementById('app');
  if(state.view==='login'){
    app.innerHTML = renderLoginPage();
    document.getElementById('modal-root').innerHTML = '';
    return;
  }
  app.innerHTML = `
    ${renderTopBar()}
    <div class="max-w-6xl mx-auto px-3 sm:px-4 md:px-6 pb-28 md:pb-10 pt-3">
      ${state.role==='student' ? renderStudentShell() : ''}
      ${state.role==='advisor' ? renderAdvisorShell() : ''}
      ${state.role==='admin' ? renderAdminShell() : ''}
    </div>
    ${state.role==='student' ? renderBottomNav() : ''}
  `;
  renderModal();
  requestAnimationFrame(()=>{ initCharts(); });
}

        <p class="text-xl font-bold text-slate-800 mb-1">เข้าสู่ระบบ</p>
        <p class="text-sm text-slate-500 mb-6">ระบบจัดการการเงินนักศึกษา โครงการครูคืนถิ่น</p>

        <div class="space-y-3">
          <div>
            <label class="text-xs text-slate-500 font-medium">ชื่อผู้ใช้งาน (Username)</label>
            <input id="login-username" type="text" placeholder="ชื่อผู้ใช้งาน" value="${esc(state.loginUsername)}" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
          </div>
          <div>

          </div>
        </div>
        <button onclick="submitLogin()" class="tap w-full py-3 rounded-2xl text-white font-semibold bg-gradient-to-r from-pink-500 to-rose-500 shadow-lg mt-5">เข้าสู่ระบบ</button>
        <p class="text-[11px] text-slate-400 mt-4 text-center leading-relaxed">พัฒนาโดย อาจารย์มะรอกี แมเดะา<br>สาขาคณิตศาสตร์ คณะวิทยาศาสตร์เทคโนโลยีและการเกษตร</p>
      </div>
    </div>
  </div>`;
}
let TOKEN = null;
async function submitLogin(){
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  state.loginUsername = username;
  if(!username || !password){ setState({loginError:'กรุณากรอกชื่อผู้ใช้งานและรหัสผ่าน'}); return; }
  try{
    const data = await callRpc('login', {p_username:username, p_password:password});
    TOKEN = data.token;
    saveToken(TOKEN);
    await enterAppAsLoggedIn();
  }catch(e){
    setState({loginError: e.message});
  }
}
async function enterAppAsLoggedIn(){
  const data = await callRpc('get_app_state', {p_token:TOKEN});
  applyAppState(data);
  state.role = ME.role;
  if(ME.role==='student') state.currentStudentId = ME.id;
  if(ME.role==='advisor') state.advisorId = ME.id;
  state.view = 'app';
  state.modal = null;
  state.tab = 'home';
  state.moreSection = 'menu';
  state.advisorSelectedStudentId = null;
  state.advisorView = 'overview';
  state.loginUsername = '';
  state.loginError = '';
  render();
}
async function logout(){
  const t = TOKEN;
  TOKEN = null;
  clearToken();
  state.view = 'login';
  state.role = null;
  state.currentStudentId = null;
  state.advisorId = null;
  state.advisorSelectedStudentId = null;
  state.modal = null;
  state.loginUsername = '';
  state.loginError = '';
  DB.users = []; DB.students = {}; ME = null;
  render();
  if(t){ try{ await sb.rpc('logout', {p_token:t}); }catch(e){} }
}
function currentLoggedInUser(){ return ME; }

  const quickActions = `

function quickBtn(ic,label,onClick){
  return `<button onclick="${onClick}" class="tap glass rounded-2xl py-4 md:py-5 flex flex-col items-center justify-center gap-1.5 text-slate-600 hover:text-pink-600">

}
function emptyRow(){ return `<p class="text-sm text-slate-400 py-6 text-center">ยังไม่มีรายการ</p>`; }
function txnRow(s,t){
  let icn, label, amtStr, amtColor, sub;
  if(t.type==='income'){ const c=catInfo(s.incomeCategories,t.categoryId); icn=c.icon; label=c.name; amtStr='+฿'+fmtMoney(t.amount); amtColor='text-emerald-600'; sub=accountName(s,t.accountId); }
  else if(t.type==='expense'){ const c=catInfo(s.expenseCategories,t.categoryId); icn=c.icon; label=c.name; amtStr='-฿'+fmtMoney(t.amount); amtColor='text-rose-600'; sub=accountName(s,t.accountId); }
  else { icn='🔁'; label='โอนเงิน'; amtStr='฿'+fmtMoney(t.amount); amtColor='text-slate-500'; sub=`${accountName(s,t.fromAccountId)} → ${accountName(s,t.toAccountId)}`; }
  return `
  <button onclick="openModal({type:'txnDetail', txnId:'${t.id}'})" class="tap w-full flex items-center gap-3 py-2.5 text-left hover:bg-white/40 rounded-xl px-1.5">
    <span class="w-10 h-10 rounded-xl bg-white/70 flex items-center justify-center text-lg shrink-0">${icn}</span>
    <span class="min-w-0 flex-1">
      <span class="block text-sm font-medium text-slate-700 truncate">${esc(label)}</span>
      <span class="block text-[11px] text-slate-400 truncate">${fmtDateShort(t.date)} · ${esc(sub)}${t.note?' · '+esc(t.note):''}</span>
    </span>
    <span class="text-sm font-bold ${amtColor} shrink-0">${amtStr}</span>
  </button>`;
}

/* =========================================================================
   STATS TAB (สถิติรายจ่าย - donut + daily avg table + accordion)
   ========================================================================= */
function renderStatsTab(){
  const sid = state.currentStudentId; const s = curStudent();
  const months = allMonthsFor(sid);
  if(!months.includes(state.statsMonth)) state.statsMonth = months[0] || TODAY.slice(0,7);
  const data = expenseByCategory(sid, state.statsMonth);
  const total = data.reduce((sum,d)=>sum+d.total,0);
  const dim = daysInMonth(state.statsMonth);

  const monthOpts = months.map(m=>`<option value="${m}" ${m===state.statsMonth?'selected':''}>${monthLabel(m)}</option>`).join('');

  const rows = data.map((d,i)=>{
    const color = CAT_COLORS[i%CAT_COLORS.length];
    const avg = d.total/dim;
    const pct = total>0 ? (d.total/total*100) : 0;
    const isOpen = state.expandedCategoryId === d.catId;
    const details = monthTxns(sid, state.statsMonth,'expense').filter(t=>t.categoryId===d.catId).sort((a,b)=>a.date.localeCompare(b.date));
    return `
    <div class="border-b border-white/50 last:border-0">
      <button onclick="toggleCategory('${d.catId}')" class="w-full flex items-center gap-3 py-2.5 text-left">
        <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${color}"></span>
        <span class="text-lg">${d.cat.icon}</span>
        <span class="flex-1 min-w-0">
          <span class="block text-sm font-medium text-slate-700 truncate">${esc(d.cat.name)}</span>
          <span class="block text-[11px] text-slate-400">เฉลี่ย/วัน ฿${fmtMoney(avg)} · ${pct.toFixed(1)}%</span>
        </span>
        <span class="text-sm font-bold text-slate-700">฿${fmtMoney(d.total)}</span>
        <span class="text-slate-400 transition-transform ${isOpen?'rotate-180':''}">${icon('chevDown','w-4 h-4')}</span>
      </button>
      ${isOpen ? `
      <div class="pl-8 pb-3 animate-slide space-y-1.5">
        ${details.map(t=>`
          <button onclick="openModal({type:'txnDetail', txnId:'${t.id}'})" class="w-full flex items-center justify-between text-xs bg-white/50 rounded-lg px-2.5 py-2 hover:bg-white/80">
            <span class="text-slate-500">${fmtDateShort(t.date)} ${t.note?'· '+esc(t.note):''}</span>
            <span class="font-semibold text-rose-600">-฿${fmtMoney(t.amount)}</span>
          </button>`).join('') || '<p class="text-xs text-slate-400">ไม่มีรายการ</p>'}
      </div>` : ''}
    </div>`;
  }).join('');

  return `
  <div class="md:grid md:grid-cols-5 md:gap-5">
    <div class="md:col-span-2 glass rounded-[24px] p-4 sm:p-5 animate-in">
      <div class="flex items-center justify-between mb-3">
        <p class="font-semibold text-slate-700">สถิติรายจ่ายตามหมวดหมู่</p>
        <select onchange="setState({statsMonth:this.value, expandedCategoryId:null})" class="glass-btn text-xs rounded-lg px-2 py-1.5">${monthOpts}</select>
      </div>
      ${total>0 ? `<div class="relative h-56 sm:h-64"><canvas id="donutChart"></canvas>
        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
          <span class="text-[11px] text-slate-400">รวมรายจ่าย</span>
          <span class="text-lg font-bold text-slate-700">฿${fmtMoney(total)}</span>
        </div></div>` : `<p class="text-sm text-slate-400 text-center py-16">ไม่มีข้อมูลรายจ่ายเดือนนี้</p>`}
    </div>
    <div class="md:col-span-3 glass rounded-[24px] p-4 sm:p-5 mt-4 md:mt-0 animate-in">
      <p class="font-semibold text-slate-700 mb-1">ตารางค่าเฉลี่ยรายวันต่อหมวดหมู่</p>
      <p class="text-[11px] text-slate-400 mb-2">คลิกแต่ละหมวดเพื่อดูรายละเอียดรายการ · ${monthLabel(state.statsMonth)} (${dim} วัน)</p>
      <div class="max-h-[480px] overflow-y-auto no-scrollbar">${rows || emptyRow()}</div>
    </div>
  </div>`;
}
let donutChartInstance=null;
function initCharts(){
  const canvas = document.getElementById('donutChart');
  if(canvas){
    const data = expenseByCategory(state.currentStudentId, state.statsMonth);
    if(donutChartInstance){ donutChartInstance.destroy(); donutChartInstance=null; }
    donutChartInstance = new Chart(canvas, {
      type:'doughnut',
      data:{ labels: data.map(d=>d.cat.name), datasets:[{ data:data.map(d=>d.total), backgroundColor: data.map((_,i)=>CAT_COLORS[i%CAT_COLORS.length]), borderColor:'rgba(255,255,255,.8)', borderWidth:3 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, boxHeight:10, font:{size:10, family:'Prompt'}, color:'#64748b' } },
        tooltip:{ callbacks:{ label:(ctx)=> ` ${ctx.label}: ฿${Number(ctx.parsed).toLocaleString('th-TH',{minimumFractionDigits:2})}` } } } }
    });
  }
  const acanvas = document.getElementById('advisorDonutChart');
  if(acanvas){
    const sid = state.advisorSelectedStudentId;
    const months = allMonthsFor(sid);
    const mkey = months[0];
    const data = mkey ? expenseByCategory(sid, mkey) : [];
    if(window._advChart){ window._advChart.destroy(); }
    window._advChart = new Chart(acanvas,{ type:'doughnut',
      data:{ labels:data.map(d=>d.cat.name), datasets:[{data:data.map(d=>d.total), backgroundColor:data.map((_,i)=>CAT_COLORS[i%CAT_COLORS.length]), borderColor:'rgba(255,255,255,.8)', borderWidth:3}]},
      options:{responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{legend:{position:'bottom', labels:{boxWidth:10,boxHeight:10,font:{size:10,family:'Prompt'},color:'#64748b'}}}}
    });
  }
}

/* =========================================================================
   REPORT TAB (รายงานสรุปประจำเดือน + PDF print)
   ========================================================================= */
function renderReportTab(){
  const sid = state.currentStudentId; const s = curStudent(); const u = curUser();
  const months = allMonthsFor(sid);
  if(!months.includes(state.reportMonth)) state.reportMonth = months[0] || TODAY.slice(0,7);
  const mkey = state.reportMonth;
  const incomes = monthTxns(sid, mkey,'income').sort((a,b)=>a.date.localeCompare(b.date));
  const expenses = monthTxns(sid, mkey,'expense').sort((a,b)=>a.date.localeCompare(b.date));
  const totalIn = incomes.reduce((a,t)=>a+Number(t.amount),0);
  const totalEx = expenses.reduce((a,t)=>a+Number(t.amount),0);
  const net = totalIn-totalEx;
  const monthOpts = months.map(m=>`<option value="${m}" ${m===mkey?'selected':''}>${monthLabel(m)}</option>`).join('');

  const incRows = incomes.map(t=>`<tr class="border-b border-white/40"><td class="py-1.5 pr-2 text-xs text-slate-500">${fmtDateShort(t.date)}</td><td class="py-1.5 pr-2 text-sm text-slate-700">${catInfo(s.incomeCategories,t.categoryId).icon} ${esc(catInfo(s.incomeCategories,t.categoryId).name)}</td><td class="py-1.5 text-sm font-semibold text-emerald-600 text-right">฿${fmtMoney(t.amount)}</td></tr>`).join('');
  const expRows = expenses.map(t=>`<tr class="border-b border-white/40"><td class="py-1.5 pr-2 text-xs text-slate-500">${fmtDateShort(t.date)}</td><td class="py-1.5 pr-2 text-sm text-slate-700">${catInfo(s.expenseCategories,t.categoryId).icon} ${esc(catInfo(s.expenseCategories,t.categoryId).name)}</td><td class="py-1.5 text-sm font-semibold text-rose-600 text-right">฿${fmtMoney(t.amount)}</td></tr>`).join('');

  const printHtml = buildPrintReport(u.name, mkey, incomes, expenses, s, totalIn, totalEx, net);
  document.getElementById('print-area').innerHTML = printHtml;

  return `
  <div class="glass rounded-[24px] p-4 sm:p-5 animate-in">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <p class="font-semibold text-slate-700 text-lg">รายงานสรุปประจำเดือน</p>
      <div class="flex items-center gap-2">
        <select onchange="setState({reportMonth:this.value})" class="glass-btn text-xs rounded-lg px-2 py-1.5">${monthOpts}</select>
        <button onclick="window.print()" class="tap flex items-center gap-1.5 bg-gradient-to-r from-slate-600 to-slate-700 text-white text-xs font-medium px-3 py-2 rounded-lg shadow">${icon('printer','w-4 h-4')} พิมพ์รายงาน (PDF)</button>

/* =========================================================================
   MODALS
   ========================================================================= */
function openModal(m){ state.modal = m; render(); }
function closeModal(){ state.modal = null; render(); }

function renderModal(){
  const root = document.getElementById('modal-root');
  if(!state.modal){ root.innerHTML=''; return; }
  const m = state.modal;
  let content = '';
  if(m.type==='addTxn') content = modalAddTxn(m.txnType);
  else if(m.type==='editTxn') content = modalAddTxn(m.txnObj.type, m.txnObj);
  else if(m.type==='transfer') content = modalTransfer();
  else if(m.type==='txnDetail') content = modalTxnDetail(m.txnId);
  else if(m.type==='accountDetail') content = modalAccountDetail(m.accountId);
  else if(m.type==='addAccount') content = modalAddAccount();
  else if(m.type==='addCategory') content = modalAddCategory(m.kind);
  else if(m.type==='userForm') content = modalUserForm(m.mode, m.userId);
  else if(m.type==='myAccount') content = modalMyAccount();

  root.innerHTML = `
  <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center p-0 sm:p-4 animate-fade" onclick="if(event.target===this) closeModal()">
    <div class="glass-solid w-full sm:max-w-md sm:rounded-[28px] rounded-t-[28px] max-h-[92vh] overflow-y-auto no-scrollbar animate-pop shadow-2xl">
      ${content}
    </div>
  </div>`;
}
function modalHeader(title){
  return `<div class="flex items-center justify-between px-5 pt-5 pb-2 sticky top-0 bg-white/0">
    <p class="text-lg font-bold text-slate-800">${title}</p>
    <button onclick="closeModal()" class="tap w-8 h-8 rounded-full bg-white/60 flex items-center justify-center text-slate-500">${icon('close','w-4 h-4')}</button>
  </div>`;
}

/* ---- Add/Edit income or expense ---- */

  const s = curStudent();
  const cats = type==='income' ? s.incomeCategories : s.expenseCategories;
  const isEdit = !!editTxn;
  const title = (isEdit?'แก้ไข':'เพิ่ม') + (type==='income'?'รายรับ':'รายจ่าย');
  const accentGrad = type==='income' ? 'from-emerald-500 to-emerald-400' : 'from-pink-500 to-rose-500';
  return `
  ${modalHeader(title)}
  <div class="px-5 pb-6 space-y-3.5">
    <div>
      <label class="text-xs text-slate-500 font-medium">วันที่</label>
      <input id="f-date" type="date" value="${editTxn?editTxn.date:TODAY}" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
    </div>
    <div>
      <label class="text-xs text-slate-500 font-medium">หมวดหมู่</label>
      <select id="f-cat" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
        ${cats.map(c=>`<option value="${c.id}" ${editTxn&&editTxn.categoryId===c.id?'selected':''}>${c.icon} ${esc(c.name)}</option>`).join('')}
      </select>
    </div>
    <div>
      <label class="text-xs text-slate-500 font-medium">บัญชี</label>
      <select id="f-acc" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
        ${s.accounts.map(a=>`<option value="${a.id}" ${editTxn&&editTxn.accountId===a.id?'selected':''}>${ACCOUNT_TYPES[a.type].icon} ${esc(a.name)} (฿${fmtMoney(a.balance)})</option>`).join('')}
      </select>
    </div>
    <div>
      <label class="text-xs text-slate-500 font-medium">จำนวนเงิน (บาท)</label>
      <input id="f-amt" type="number" min="0" step="0.01" value="${editTxn?editTxn.amount:''}" placeholder="0.00" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-lg font-bold text-slate-800">
    </div>
    <div>
      <label class="text-xs text-slate-500 font-medium">โน้ตเพิ่มเติม (ไม่บังคับ)</label>
      <input id="f-note" type="text" value="${editTxn?esc(editTxn.note||''):''}" placeholder="เช่น ค่าอาหารเที่ยง" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
    </div>
    <button onclick="submitTxn('${type}', ${isEdit?`'${editTxn.id}'`:'null'})" class="tap w-full py-3 rounded-2xl text-white font-semibold bg-gradient-to-r ${accentGrad} shadow-lg mt-2">
      ${isEdit?'บันทึกการแก้ไข':'บันทึกรายการ'}
    </button>
  </div>`;
}
async function submitTxn(type, editId){
  const date = document.getElementById('f-date').value;
  const categoryId = document.getElementById('f-cat').value;
  const accountId = document.getElementById('f-acc').value;
  const amount = parseFloat(document.getElementById('f-amt').value);
  const note = document.getElementById('f-note').value.trim();
  if(!date || !amount || amount<=0){ alert('กรุณากรอกวันที่และจำนวนเงินให้ถูกต้อง'); return; }
  try{
    if(editId){
      await callRpc('edit_transaction', {p_token:TOKEN, p_txn_id:editId, p_date:date, p_category_id:categoryId, p_account_id:accountId, p_amount:amount, p_note:note});
    } else {
      await callRpc('add_transaction', {p_token:TOKEN, p_type:type, p_date:date, p_category_id:categoryId, p_account_id:accountId, p_amount:amount, p_note:note});
    }
    await refreshAppState();
    closeModal();
  }catch(e){ alert(e.message); }
}

    <button onclick="submitTransfer()" class="tap w-full py-3 rounded-2xl text-white font-semibold bg-gradient-to-r from-slate-600 to-slate-800 shadow-lg mt-2">ยืนยันการโอนเงิน</button>

async function submitTransfer(){
  const s = curStudent();
  const date = document.getElementById('f-date').value;
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  const amount = parseFloat(document.getElementById('f-amt').value);
  const note = document.getElementById('f-note').value.trim();
  if(from===to){ alert('กรุณาเลือกบัญชีต้นทางและปลายทางให้ต่างกัน'); return; }
  if(!amount || amount<=0){ alert('กรุณากรอกจำนวนเงินให้ถูกต้อง'); return; }
  const fromAcc = s.accounts.find(a=>a.id===from);
  if(fromAcc.balance < amount){ if(!confirm('ยอดเงินในบัญชีต้นทางไม่พอ ต้องการดำเนินการต่อหรือไม่? (ยอดจะติดลบ)')) return; }
  try{
    await callRpc('add_transfer', {p_token:TOKEN, p_date:date, p_from_account_id:from, p_to_account_id:to, p_amount:amount, p_note:note});
    await refreshAppState();
    closeModal();
  }catch(e){ alert(e.message); }
}

/* ---- Transaction detail / edit / delete ---- */
function modalTxnDetail(txnId){
  const s = curStudent();
  const t = s.transactions.find(x=>x.id===txnId);
  if(!t) return modalHeader('ไม่พบรายการ');
  let icn,label,amtStr,amtColor,extra;
  if(t.type==='income'){ const c=catInfo(s.incomeCategories,t.categoryId); icn=c.icon; label='รายรับ: '+c.name; amtStr='+฿'+fmtMoney(t.amount); amtColor='text-emerald-600'; extra=`<p class="text-sm text-slate-500">บัญชี: ${esc(accountName(s,t.accountId))}</p>`; }
  else if(t.type==='expense'){ const c=catInfo(s.expenseCategories,t.categoryId); icn=c.icon; label='รายจ่าย: '+c.name; amtStr='-฿'+fmtMoney(t.amount); amtColor='text-rose-600'; extra=`<p class="text-sm text-slate-500">บัญชี: ${esc(accountName(s,t.accountId))}</p>`; }
  else { icn='🔁'; label='โอนเงินข้ามบัญชี'; amtStr='฿'+fmtMoney(t.amount); amtColor='text-slate-600'; extra=`<p class="text-sm text-slate-500">จาก: ${esc(accountName(s,t.fromAccountId))} → ไป: ${esc(accountName(s,t.toAccountId))}</p>`; }
  return `
  ${modalHeader('รายละเอียดธุรกรรม')}
  <div class="px-5 pb-6">
    <div class="flex flex-col items-center text-center py-3">
      <span class="w-16 h-16 rounded-2xl bg-white/70 flex items-center justify-center text-3xl mb-2">${icn}</span>
      <p class="font-semibold text-slate-700">${esc(label)}</p>
      <p class="text-2xl font-extrabold ${amtColor} mt-1">${amtStr}</p>
    </div>
    <div class="bg-white/40 rounded-2xl p-3.5 space-y-1.5 mt-2">
      <p class="text-sm text-slate-500">วันที่: ${fmtDateFull(t.date)}</p>
      ${extra}
      ${t.note ? `<p class="text-sm text-slate-500">โน้ต: ${esc(t.note)}</p>` : ''}
    </div>
    <div class="flex gap-2 mt-4">
      ${t.type!=='transfer' ? `<button onclick="openModal({type:'editTxn', txnObj: DB.students['${state.currentStudentId}'].transactions.find(x=>x.id==='${t.id}')})" class="tap flex-1 py-2.5 rounded-xl bg-slate-100 text-slate-700 font-medium flex items-center justify-center gap-1.5">${icon('edit','w-4 h-4')} แก้ไข</button>` : ''}
      <button onclick="deleteTxn('${t.id}')" class="tap flex-1 py-2.5 rounded-xl bg-rose-100 text-rose-600 font-medium flex items-center justify-center gap-1.5">${icon('trash','w-4 h-4')} ลบรายการ</button>
    </div>
  </div>`;
}
async function deleteTxn(txnId){

async function submitAddCategory(kind){
  const s = curStudent();
  const isExp = kind==='expense';
  const list = isExp ? s.expenseCategories : s.incomeCategories;
  const max = isExp ? MAX_EXPENSE_CATS : MAX_INCOME_CATS;
  if(list.length>=max){ alert('มีหมวดหมู่ครบจำนวนสูงสุดแล้ว'); return; }
  const name = document.getElementById('f-catname').value.trim();
  const iconVal = document.getElementById('f-caticon').value.trim() || (isExp?'🏷️':'💵');

  try{
    await callRpc('add_category', {p_token:TOKEN, p_kind:kind, p_name:name, p_icon:iconVal});
    await refreshAppState();
    closeModal();
  }catch(e){ alert(e.message); }

function renderAdvisorReportSection(sid){
  const s = DB.students[sid]; const u = DB.users.find(x=>x.id===sid);
  const months = allMonthsFor(sid);
  if(!state.advisorReportMonth || !months.includes(state.advisorReportMonth)) state.advisorReportMonth = months[0] || TODAY.slice(0,7);
  const mkey = state.advisorReportMonth;
  const incomes = monthTxns(sid, mkey,'income').sort((a,b)=>a.date.localeCompare(b.date));
  const expenses = monthTxns(sid, mkey,'expense').sort((a,b)=>a.date.localeCompare(b.date));
  const totalIn = incomes.reduce((a,t)=>a+Number(t.amount),0);
  const totalEx = expenses.reduce((a,t)=>a+Number(t.amount),0);
  const net = totalIn-totalEx;
  const monthOpts = months.map(m=>`<option value="${m}" ${m===mkey?'selected':''}>${monthLabel(m)}</option>`).join('');

  const incRows = incomes.map(t=>`<tr class="border-b border-white/40"><td class="py-1.5 pr-2 text-xs text-slate-500">${fmtDateShort(t.date)}</td><td class="py-1.5 pr-2 text-sm text-slate-700">${catInfo(s.incomeCategories,t.categoryId).icon} ${esc(catInfo(s.incomeCategories,t.categoryId).name)}</td><td class="py-1.5 text-sm font-semibold text-emerald-600 text-right">฿${fmtMoney(t.amount)}</td></tr>`).join('');
  const expRows = expenses.map(t=>`<tr class="border-b border-white/40"><td class="py-1.5 pr-2 text-xs text-slate-500">${fmtDateShort(t.date)}</td><td class="py-1.5 pr-2 text-sm text-slate-700">${catInfo(s.expenseCategories,t.categoryId).icon} ${esc(catInfo(s.expenseCategories,t.categoryId).name)}</td><td class="py-1.5 text-sm font-semibold text-rose-600 text-right">฿${fmtMoney(t.amount)}</td></tr>`).join('');

  document.getElementById('print-area').innerHTML = buildPrintReport(u.name, mkey, incomes, expenses, s, totalIn, totalEx, net);

  return `
  <div class="glass rounded-[24px] p-4 sm:p-5 animate-in">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <p class="font-semibold text-slate-700 text-lg">รายงานสรุปประจำเดือน · ${esc(u.name)}</p>
      <div class="flex items-center gap-2">
        <select onchange="setState({advisorReportMonth:this.value})" class="glass-btn text-xs rounded-lg px-2 py-1.5">${monthOpts}</select>
        <button onclick="window.print()" class="tap flex items-center gap-1.5 bg-gradient-to-r from-slate-600 to-slate-700 text-white text-xs font-medium px-3 py-2 rounded-lg shadow">${icon('printer','w-4 h-4')} พิมพ์รายงาน (PDF)</button>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-2 mb-4">
      <div class="glass-btn rounded-xl p-3 text-center"><p class="text-[11px] text-slate-500">รายรับรวม</p><p class="text-base sm:text-lg font-bold text-emerald-600">฿${fmtMoney(totalIn)}</p></div>
      <div class="glass-btn rounded-xl p-3 text-center"><p class="text-[11px] text-slate-500">รายจ่ายรวม</p><p class="text-base sm:text-lg font-bold text-rose-600">฿${fmtMoney(totalEx)}</p></div>
      <div class="glass-btn rounded-xl p-3 text-center"><p class="text-[11px] text-slate-500">คงเหลือสุทธิ</p><p class="text-base sm:text-lg font-bold ${net>=0?'text-slate-700':'text-rose-600'}">฿${fmtMoney(net)}</p></div>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div class="bg-white/40 rounded-2xl p-3.5">
        <p class="text-sm font-semibold text-emerald-600 mb-2 flex items-center gap-1.5">${icon('income','w-4 h-4')} รายรับ (${incomes.length} รายการ)</p>
        <table class="w-full"><tbody>${incRows || '<tr><td class="text-xs text-slate-400 py-4">ไม่มีรายการ</td></tr>'}</tbody></table>
      </div>
      <div class="bg-white/40 rounded-2xl p-3.5">
        <p class="text-sm font-semibold text-rose-600 mb-2 flex items-center gap-1.5">${icon('expense','w-4 h-4')} รายจ่าย (${expenses.length} รายการ)</p>
        <table class="w-full"><tbody>${expRows || '<tr><td class="text-xs text-slate-400 py-4">ไม่มีรายการ</td></tr>'}</tbody></table>
      </div>
    </div>
  </div>`;
}

        ${advisors.map(a=>`<option value="${a.id}" ${u&&u.advisorId===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}
      </select>
    </div>
    <div class="border-t border-white/50 pt-3.5 grid grid-cols-2 gap-2.5">
      <div>
        <label class="text-xs text-slate-500 font-medium">ชื่อผู้ใช้งาน (Username)</label>
        <input id="f-username" type="text" placeholder="อัตโนมัติจากอีเมล" value="${u?esc(u.username):''}" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
      </div>
      <div>
        <label class="text-xs text-slate-500 font-medium">รหัสผ่าน ${isEdit?'(เว้นว่างถ้าไม่เปลี่ยน)':`(ค่าเริ่มต้น ${DEFAULT_PASSWORD})`}</label>
        <input id="f-password" type="text" placeholder="${isEdit?'••••':DEFAULT_PASSWORD}" value="${isEdit?'':DEFAULT_PASSWORD}" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
      </div>
    </div>
    <button onclick="submitUserForm('${mode}', ${isEdit?`'${userId}'`:'null'})" class="tap w-full py-3 rounded-2xl text-white font-semibold bg-gradient-to-r from-pink-500 to-rose-500 shadow-lg mt-2">${isEdit?'บันทึกการแก้ไข':'เพิ่มผู้ใช้งาน'}</button>
  </div>`;
}
function toggleAdvisorField(){
  const role = document.getElementById('f-role').value;
  document.getElementById('f-advisorwrap').classList.toggle('hidden', role==='advisor');
}
async function submitUserForm(mode, userId){
  const role = document.getElementById('f-role').value;
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  let username = document.getElementById('f-username').value.trim();
  const password = document.getElementById('f-password').value;
  if(!name || !email){ alert('กรุณากรอกชื่อและอีเมลให้ครบถ้วน'); return; }
  if(!username) username = usernameFromEmail(email);
  try{
    if(mode==='add'){
      const advisorId = role==='student' ? document.getElementById('f-advisor').value : null;
      const major = role==='student' ? document.getElementById('f-major').value.trim() : null;
      await callRpc('admin_create_user', {
        p_token:TOKEN, p_role:role, p_name:name, p_email:email, p_username:username,
        p_password: password || DEFAULT_PASSWORD, p_advisor_id:advisorId, p_major:major,
        p_dept: role==='advisor' ? '' : null,
      });
    } else {
      const target = DB.users.find(x=>x.id===userId);
      const advisorId = target.role==='student' ? document.getElementById('f-advisor').value : null;
      const major = target.role==='student' ? document.getElementById('f-major').value.trim() : null;
      await callRpc('admin_update_user', {
        p_token:TOKEN, p_target_id:userId, p_name:name, p_email:email, p_username:username,
        p_password: password || null, p_advisor_id:advisorId, p_major:major,
      });
    }
    await refreshAppState();
    closeModal();
  }catch(e){ alert(e.message); }
}
async function deleteUser(userId){
  const u = DB.users.find(x=>x.id===userId);
  if(!u) return;
  const label = u.role==='advisor' ? 'อาจารย์ที่ปรึกษา' : 'นักศึกษา';
  if(!confirm(`ยืนยันการลบ${label} "${u.name}"? ข้อมูลที่เกี่ยวข้องทั้งหมดจะถูกลบไปด้วยและไม่สามารถกู้คืนได้`)) return;
  try{
    const result = await callRpc('admin_delete_user', {p_token:TOKEN, p_target_id:userId, p_cascade:false});
    if(result && result.needsCascadeConfirm){
      const names = (result.students||[]).join(', ');
      const ok = confirm(`อาจารย์ "${u.name}" มีนักศึกษาในความดูแล ${result.count} คน (${names})\n\nการลบจะลบข้อมูลของนักศึกษาทั้งหมดที่เกี่ยวข้องไปด้วย ทั้งบัญชี หมวดหมู่ และประวัติธุรกรรมทั้งหมด และไม่สามารถกู้คืนได้\n\nต้องการดำเนินการต่อหรือไม่?`);
      if(!ok) return;
      await callRpc('admin_delete_user', {p_token:TOKEN, p_target_id:userId, p_cascade:true});
    }
    await refreshAppState();
    render();
  }catch(e){ alert(e.message); }
}

/* ---------- My Account (self-service username/password) ---------- */
function modalMyAccount(){
  const user = currentLoggedInUser();
  const roleLabel = {admin:'ผู้ดูแลระบบ', advisor:'อาจารย์ที่ปรึกษา', student:'นักศึกษา'}[user.role];
  return `
  ${modalHeader('บัญชีของฉัน')}
  <div class="px-5 pb-6 space-y-3.5">
    <div class="flex items-center gap-3 bg-white/40 rounded-2xl p-3.5">
      <span class="w-11 h-11 rounded-xl bg-gradient-to-br from-pink-400 to-rose-400 flex items-center justify-center text-white font-bold shrink-0">${esc(user.name[0])}</span>
      <div class="min-w-0"><p class="text-sm font-semibold text-slate-700 truncate">${esc(user.name)}</p><p class="text-[11px] text-slate-400">${roleLabel} · ${esc(user.email)}</p></div>
    </div>
    <div>
      <label class="text-xs text-slate-500 font-medium">ชื่อผู้ใช้งาน (Username)</label>
      <input id="acc-username" type="text" value="${esc(user.username)}" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
    </div>
    <div class="border-t border-white/50 pt-3.5">
      <label class="text-xs text-slate-500 font-medium">รหัสผ่านใหม่ (เว้นว่างหากไม่ต้องการเปลี่ยน)</label>
      <input id="acc-password" type="password" placeholder="รหัสผ่านใหม่" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
    </div>
    <div>
      <label class="text-xs text-slate-500 font-medium">ยืนยันรหัสผ่านใหม่</label>
      <input id="acc-password2" type="password" placeholder="กรอกรหัสผ่านใหม่อีกครั้ง" onkeydown="if(event.key==='Enter') submitMyAccount('${user.id}')" class="w-full mt-1 glass-btn rounded-xl px-3 py-2.5 text-sm text-slate-700">
    </div>
    <button onclick="submitMyAccount('${user.id}')" class="tap w-full py-3 rounded-2xl text-white font-semibold bg-gradient-to-r from-pink-500 to-rose-500 shadow-lg mt-2">บันทึกการเปลี่ยนแปลง</button>
  </div>`;
}
async function submitMyAccount(userId){
  const username = document.getElementById('acc-username').value.trim();
  const pwd1 = document.getElementById('acc-password').value;
  const pwd2 = document.getElementById('acc-password2').value;
  if(!username){ alert('กรุณากรอกชื่อผู้ใช้งาน'); return; }
  if(pwd1 || pwd2){
    if(pwd1 !== pwd2){ alert('รหัสผ่านใหม่และการยืนยันรหัสผ่านไม่ตรงกัน'); return; }
    if(pwd1.length < 4){ alert('รหัสผ่านใหม่ควรมีความยาวอย่างน้อย 4 ตัวอักษร'); return; }
  }
  try{
    await callRpc('update_my_account', {p_token:TOKEN, p_username:username, p_new_password: pwd1 || null});
    ME.username = username;
    closeModal();
    alert('บันทึกข้อมูลบัญชีเรียบร้อยแล้ว');
  }catch(e){ alert(e.message); }
}

function toggleCategory(catId){ state.expandedCategoryId = state.expandedCategoryId===catId ? null : catId; render(); }

/* =========================================================================
   INIT — กู้คืนเซสชันเดิมจาก localStorage ถ้ามี ไม่งั้นแสดงหน้า login
   ========================================================================= */
(async function initApp(){
  const savedToken = getToken();
  if(savedToken){
    TOKEN = savedToken;
    try{
      const data = await callRpc('get_app_state', {p_token:TOKEN});
      applyAppState(data);
      state.role = ME.role;
      if(ME.role==='student') state.currentStudentId = ME.id;
      if(ME.role==='advisor') state.advisorId = ME.id;
      state.view = 'app';
    }catch(e){
      TOKEN = null;
      clearToken();
      state.view = 'login';
    }
  }
  render();
})();
</script>
